services:
  cartera:
    # Fa pull de la imatge construïda per GitHub Actions (no la construeix localment).
    # Per defecte agafa :latest (l'últim push a main). Per clavar una versió:
    #   VERSION=v1.2.0 docker compose -f docker-compose.prod.yml up -d
    image: ghcr.io/gerardag/aplom:${VERSION:-latest}
    container_name: cartera-rebalancer
    ports:
      # host:container — change the left side if 3000 is taken on your server
      - "3000:3000"
    environment:
      - PORT=3000
      - DATA_DIR=/app/data
    volumes:
      # bind mount keeps the SQLite database across restarts and rebuilds
      - ./data:/app/data
    restart: unless-stopped
